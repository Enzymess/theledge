<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Not Found — The Ledge Baguio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--pine:#1a2e1a;--pine-dark:#0d1a0d;--gold:#c5a255;--cream:#f5f0e8;--font-serif:'Cormorant Garamond',serif;--font-sans:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--pine-dark);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:480px}
.logo{font-family:var(--font-serif);font-size:1.4rem;font-weight:300;margin-bottom:3rem;letter-spacing:0.1em}
.logo span{color:var(--gold);font-style:italic}
.num{font-family:var(--font-serif);font-size:6rem;font-weight:300;color:var(--gold);line-height:1;margin-bottom:1rem}
h1{font-family:var(--font-serif);font-size:1.8rem;font-weight:300;margin-bottom:0.8rem}
p{font-size:0.82rem;color:rgba(200,216,204,0.5);line-height:1.8;margin-bottom:2rem}
.btn{display:inline-block;background:var(--gold);color:var(--pine);font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.8rem 2rem;text-decoration:none;font-family:var(--font-sans);transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.ghost{display:inline-block;margin-left:1rem;color:rgba(200,216,204,0.4);font-size:0.68rem;letter-spacing:0.1em;text-decoration:none;transition:color 0.2s}
.ghost:hover{color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">The <span>Ledge</span></div>
  <div class="num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for may have moved or doesn't exist.<br>Let's get you back to the view.</p>
  <a class="btn" href="/">Back to Home</a>
  <a class="ghost" href="/#rooms">Browse Rooms</a>
</div>
</body>
</html>
